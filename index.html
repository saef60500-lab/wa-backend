<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Multi-Session</title>
    <style>
        :root {
            --green: #25D366;
            --dark-bg: #0b141a;
            --card-bg: #111b21;
            --text-main: #e9edef;
            --text-muted: #8696a0;
            --border: #222d34;
            --yellow: #f0b429;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { color: var(--green); text-align: center; }
        .status-banner {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #2a3942;
            color: white;
            box-sizing: border-box;
        }
        button {
            background: var(--green);
            color: var(--dark-bg);
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { opacity: 0.9; }
        #qr-container { text-align: center; padding: 20px; border: 1px dashed var(--border); margin: 10px 0; }
        #qr-img { width: 250px; height: 250px; margin: 10px auto; display: none; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #202c33; color: var(--text-muted); }
        .tab-btn.active { background: var(--green); color: var(--dark-bg); }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>مُرسل واتساب الذكي</h1>

    <div id="status-banner" class="status-banner" style="background: rgba(255,255,255,0.05);">
        <div class="status-dot" style="background: gray;"></div>
        <span id="status-text">جارٍ التحقق من السيرفر...</span>
    </div>

    <div class="tab-buttons">
        <button class="tab-btn active" onclick="showPage('send-page', this)">إرسال رسائل</button>
        <button class="tab-btn" onclick="showPage('qr-page', this)">ربط واتساب (QR)</button>
    </div>

    <div id="send-page" class="page active">
        <label>الأرقام (رقم في كل سطر مع مفتاح الدولة):</label>
        <textarea id="numbers-input" rows="5" placeholder="9647XXXXXXXX"></textarea>
        
        <label>الرسالة:</label>
        <textarea id="message-input" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>
        
        <button onclick="sendBulk()">بدء الإرسال الجماعي</button>
        <div id="logs" style="margin-top: 15px; font-size: 0.9em; color: var(--text-muted);"></div>
    </div>

    <div id="qr-page" class="page">
        <div id="qr-container">
            <p id="qr-status-text">اضغط على تحديث لجلب كود QR</p>
            <img id="qr-img" src="" alt="WhatsApp QR Code">
            <button onclick="loadQR()" style="background: #202c33; color: white;">تحديث كود QR</button>
        </div>
    </div>
</div>

<script>
    const SERVER = 'https://wa-backend-production-1b28.up.railway.app';

    // 1. إدارة معرف المستخدم (Unique Session ID)
    let userId = localStorage.getItem('wa_user_id');
    if (!userId) {
        userId = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('wa_user_id', userId);
    }

    // تبديل الصفحات
    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
        if(pageId === 'qr-page') loadQR();
    }

    // 2. فحص حالة السيرفر والاتصال للمستخدم الحالي
    async function checkStatus() {
        const txt = document.getElementById('status-text');
        const dot = document.querySelector('.status-dot');
        try {
            const r = await fetch(`${SERVER}/status?id=${userId}`);
            const d = await r.json();
            if (d.ready) {
                txt.textContent = 'متصل وجاهز للإرسال';
                dot.style.background = 'var(--green)';
            } else {
                txt.textContent = d.hasQR ? 'بانتظار مسح كود QR' : 'السيرفر يعمل (غير متصل)';
                dot.style.background = 'var(--yellow)';
            }
        } catch (e) {
            txt.textContent = 'تعذر الاتصال بالسيرفر';
            dot.style.background = 'red';
        }
    }

    // 3. تحميل كود QR الخاص بالمستخدم
    async function loadQR() {
        const qImg = document.getElementById('qr-img');
        const qTxt = document.getElementById('qr-status-text');
        qTxt.textContent = 'جارٍ الطلب...';
        qImg.style.display = 'none';
        try {
            const r = await fetch(`${SERVER}/qr?id=${userId}`);
            const html = await r.text();
            // استخراج رابط الصورة من الـ HTML البسيط المرسل من السيرفر
            const match = html.match(/src="([^"]+)"/);
            if (match) {
                qImg.src = match[1];
                qImg.style.display = 'block';
                qTxt.textContent = 'امسح الكود من تطبيق واتساب';
            } else {
                qTxt.textContent = 'لم يتم إنشاء QR بعد، انتظر ثوانٍ وجرب مرة أخرى';
            }
        } catch (e) {
            qTxt.textContent = 'خطأ في الاتصال';
        }
    }

    // 4. إرسال الرسائل الجماعية باستخدام المعرف
    async function sendBulk() {
        const numbers = document.getElementById('numbers-input').value.split('\n').filter(n => n.trim() !== '');
        const message = document.getElementById('message-input').value;
        const logs = document.getElementById('logs');
        
        if (numbers.length === 0 || !message) return alert('يرجى إدخال الأرقام والرسالة');

        logs.innerHTML = 'بدء الإرسال...<br>';
        for (let num of numbers) {
            try {
                const res = await fetch(`${SERVER}/send-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: userId, phone: num.trim(), message: message })
                });
                const data = await res.json();
                logs.innerHTML += (data.success ? `✅ تم الإرسال لـ ${num}` : `❌ فشل لـ ${num}: ${data.error}`) + '<br>';
            } catch (e) {
                logs.innerHTML += `❌ خطأ في الاتصال أثناء الإرسال لـ ${num}<br>`;
            }
        }
        logs.innerHTML += '<b>انتهت العملية.</b>';
    }

    // فحص الحالة تلقائياً كل 10 ثوانٍ
    setInterval(checkStatus, 10000);
    checkStatus();
</script>

</body>
</html>
