[phases.setup]
nixPkgs = ["nodejs", "chromium", "glib"]
aptPkgs = [
    "libnss3",
    "libatk1.0-0",
    "libatk-bridge2.0-0",
    "libcups2",
    "libdrm2",
    "libxkbcommon0",
    "libxcomposite1",
    "libxdamage1",
    "libxrandr2",
    "libgbm1",
    "libasound2",
    "libpango-1.0-0",
    "libcairo2"
]

[phases.build]
cmds = ["npm install"]

[phases.start]
cmd = "node server.js"
